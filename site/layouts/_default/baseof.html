<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:image" content="{{ .Site.Params.ogImage | absURL }}">
  <meta property="og:site_name" content="Apno">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:image" content="{{ .Site.Params.ogImage | absURL }}">

  <!-- Theme & Icons -->
  <meta name="theme-color" content="{{ .Site.Params.themeColor }}">
  <link rel="icon" type="image/svg+xml" href="{{ "images/logo.svg" | relURL }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "images/favicon-32x32.png" | relURL }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "images/apple-touch-icon.png" | relURL }}">

  <!-- JSON-LD Structured Data -->
  {{ if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Apno",
    "description": "{{ .Site.Params.description }}",
    "operatingSystem": "Android",
    "applicationCategory": "HealthApplication",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "url": "{{ .Site.BaseURL }}",
    "downloadUrl": "{{ .Site.Params.playStoreURL }}",
    "screenshot": "{{ "screenshots/phone/home_2.png" | absURL }}",
    "author": {
      "@type": "Person",
      "name": "guillermodotn",
      "url": "{{ .Site.Params.githubURL }}"
    }
  }
  </script>
  {{ end }}

  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <header class="site-header">
    <nav>
      <a href="{{ "" | relURL }}" class="nav-logo">
        <img src="{{ "images/logo.svg" | relURL }}" alt="Apno" width="32" height="32">
        <span>Apno</span>
      </a>
      <div class="nav-links">
        <a href="{{ "changelog/" | relURL }}">Changelog</a>
        <a href="{{ "privacy/" | relURL }}">Privacy</a>
        <a href="{{ .Site.Params.githubURL }}" target="_blank" rel="noopener">GitHub</a>
      </div>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ now.Year }} Apno &middot; <a href="{{ "privacy/" | relURL }}">Privacy Policy</a> &middot; <a href="{{ .Site.Params.githubURL }}" target="_blank" rel="noopener">Source</a></p>
  </footer>
</body>
</html>
