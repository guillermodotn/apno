name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      track:
        description: "Release track"
        required: true
        default: "beta"
        type: choice
        options:
          - alpha
          - beta
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: ${{ secrets.PACKAGE_NAME || 'io.github.guillermodotn.apno' }}

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: play-console

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          fi

      - name: Cache Buildozer global
        uses: actions/cache@v5
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-${{ runner.os }}-

      - name: Build AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v "$HOME/.buildozer:/home/user/.buildozer" \
            -e P4A_RELEASE_KEYSTORE=/app/release.keystore \
            -e P4A_RELEASE_KEYALIAS=${{ secrets.ANDROID_KEYSTORE_ALIAS }} \
            -e P4A_RELEASE_KEYSTORE_PASSWD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -e P4A_RELEASE_KEYALIAS_PASSWD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            -w /app \
            kivy/buildozer:latest \
            android release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: apno-android-aab
          path: bin/*.aab
          retention-days: 7

      - name: Get track
        id: track
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TRACK="${{ github.event.inputs.track }}"
          else
            TRACK="beta"
          fi
          echo "track=$TRACK" >> $GITHUB_OUTPUT

      - name: Deploy to Google Play
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_CREDENTIALS }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: bin/*.aab
          track: ${{ steps.track.outputs.track }}
          status: completed
